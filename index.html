<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vera Record</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont,
                   'Segoe UI', sans-serif;
      background: #ffffff;
      color: #333333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 560px;
      padding: 48px 32px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 32px;
    }
    h1 {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a2e;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 16px;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .cta {
      display: inline-block;
      background: #2d6a4f;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .cta:hover { background: #1b4332; }
    .secondary {
      display: block;
      font-size: 13px;
      color: #888888;
      margin-top: 24px;
    }
    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 40px 0;
    }
    .charts-link {
      font-size: 13px;
      color: #2d6a4f;
      text-decoration: none;
    }
    .charts-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">

    <svg class="logo" viewBox="0 0 400 400"
         xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="400" rx="60" fill="#2d6a4f"/>
      <g stroke="#ffffff" fill="none" stroke-width="10"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M 110 130 L 175 320 L 240 130
                 L 240 320 M 240 130 L 305 130
                 Q 345 130 345 175 Q 345 220 305 220
                 L 240 220 M 290 220 L 345 320"/>
      </g>
    </svg>

    <h1>Vera Record</h1>

    <p>On-chain research for tokenized real-world assets.
    Independent analysis of institutional activity
    on public blockchains, starting with Ethereum.</p>

    <a class="cta"
       href="https://verarecord.substack.com"
       target="_blank">
      Read the research
    </a>

    <hr class="divider">

    <!-- <a class="charts-link"
       href="/substack/post_01/">
      Interactive charts — Post 01
    </a> -->

    <span class="secondary">
      Built by Andreea G. &middot;
      Greater Toronto Area &middot;
      <a href="https://verarecord.substack.com"
         style="color:#888888">Substack</a>
    </span>

  </div>
</body>
</html>
